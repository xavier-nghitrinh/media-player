<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Space Cinema (iOS Native Fix)</title>
    <style>
        :root {
            --bg: #030712;
            --card: #0f172a;
            --text: #f1f5f9;
            --accent: #06b6d4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            display: block;
            margin-top: 12px;
        }
        .btn-main { background: var(--accent); color: #000; font-weight: 900; }
        .btn-sub { background: #1e293b; color: var(--text); border: 1px solid #334155; }
        .hidden { display: none !important; }
        .status { color: var(--accent); font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; }
        
        /* Ẩn vùng video/phát custom cũ, chuyển sang dạng overlay ẩn */
        #playerWrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align:center; color:var(--accent); font-size:1.4rem; font-weight:900;">VR SPACE CINEMA</h1>
        
        <div id="resumeCard" class="card hidden">
            <div class="status">▶ XEM TIẾP DỞ DANG</div>
            <p id="resumeTitle" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></p>
            <button onclick="playMovie('resume')" class="btn btn-main">CHƠI TIẾP NGAY</button>
        </div>

        <div class="card">
            <h3 style="margin-bottom:6px;">Mở Tệp Phim Mới</h3>
            <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:12px;">Chọn cùng lúc cả Video và Phụ đề (.srt/.vtt)</p>
            <button onclick="playMovie('new')" class="btn btn-sub">📁 Chọn tệp tin</button>
        </div>

        <input type="file" id="fileInput" accept="video/*, .srt, .vtt" multiple class="hidden" onchange="handleFiles(event)">
    </div>

    <div id="playerWrapper" class="hidden">
        <video id="vPlayer" controls></video>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const vPlayer = document.getElementById('vPlayer');
        const playerWrapper = document.getElementById('playerWrapper');
        const resumeCard = document.getElementById('resumeCard');
        const resumeTitle = document.getElementById('resumeTitle');

        let cachedVideoFile = null;
        let activeVideoURL = null;
        let activeSubURL = null;

        window.onload = () => {
            const lastMovie = localStorage.getItem('ios_vr_name');
            if (lastMovie) {
                resumeTitle.innerText = lastMovie;
                resumeCard.classList.remove('hidden');
            }
        };

        function playMovie(mode) {
            if (mode === 'resume' && cachedVideoFile) {
                startPlayback(cachedVideoFile);
                return;
            }
            fileInput.click();
        }

        function handleFiles(event) {
            const files = Array.from(event.target.files);
            let video = null, sub = null;

            files.forEach(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if (['mp4','mkv','webm','mov','avi','m4v'].includes(ext)) video = f;
                if (['srt','vtt'].includes(ext)) sub = f;
            });

            if (video) {
                cachedVideoFile = video;
                if (sub) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        let txt = e.target.result;
                        if (sub.name.endsWith('.srt')) txt = "WEBVTT\n\n" + txt.replace(/\r/g, '').replace(/(\d\d:\d\d:\d\d),(\d\d\d)/g, '$1.$2');
                        localStorage.setItem(`ios_sub_${video.name}`, txt);
                        startPlayback(video);
                    };
                    reader.readAsText(sub);
                } else {
                    startPlayback(video);
                }
            }
        }

        function startPlayback(videoFile) {
            // Giải phóng bộ nhớ ngay lập tức trước khi nạp phim mới
            if (activeVideoURL) URL.revokeObjectURL(activeVideoURL);
            if (activeSubURL) URL.revokeObjectURL(activeSubURL);

            activeVideoURL = URL.createObjectURL(videoFile);
            vPlayer.src = activeVideoURL;

            // Nạp phụ đề từ cache
            const cachedSub = localStorage.getItem(`ios_sub_${videoFile.name}`);
            const oldTrack = vPlayer.querySelector('track');
            if (oldTrack) oldTrack.remove();

            if (cachedSub) {
                const blob = new Blob([cachedSub], { type: 'text/vtt' });
                activeSubURL = URL.createObjectURL(blob);
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.src = activeSubURL;
                track.default = true;
                vPlayer.appendChild(track);
            }

            // Hiện giao diện xem phim
            playerWrapper.classList.remove('hidden');

            // Lưu lịch sử
            localStorage.setItem('ios_vr_name', videoFile.name);

            vPlayer.onloadedmetadata = () => {
                const savedPos = parseFloat(localStorage.getItem(`ios_pos_${videoFile.name}`)) || 0;
                vPlayer.currentTime = savedPos;
                
                // Kích hoạt Fullscreen Native của Apple
                if (vPlayer.webkitEnterFullscreen) {
                    vPlayer.webkitEnterFullscreen();
                }
                vPlayer.play();
            };
        }

        // Tự động lưu vị trí phát khi user bấm Pause hoặc khi thoát Fullscreen Native
        vPlayer.addEventListener('pause', saveState);
        vPlayer.addEventListener('webkitendfullscreen', () => {
            saveState();
            vPlayer.pause();
            playerWrapper.classList.add('hidden');
            // Xóa src để giải phóng hoàn toàn RAM cho Webview
            vPlayer.removeAttribute('src');
            vPlayer.load();
            
            // Cập nhật lại màn hình chính
            const lastMovie = localStorage.getItem('ios_vr_name');
            if (lastMovie) {
                resumeTitle.innerText = lastMovie;
                resumeCard.classList.remove('hidden');
            }
        });

        function saveState() {
            if (cachedVideoFile && vPlayer.currentTime > 0) {
                localStorage.setItem(`ios_pos_${cachedVideoFile.name}`, vPlayer.currentTime);
            }
        }
    </script>
</body>
</html>
